<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中國文化大學教務處 - 數位化行政服務平台 (POC)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8f9fa; color: #333; }
        .pccu-red { background-color: #A10F2B; }
        .pccu-red-text { color: #A10F2B; }
        .hidden { display: none; }
        .card { background: white; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 24px; margin-bottom: 20px; border: 1px solid #eee; }
        .btn { border-radius: 12px; padding: 14px; font-weight: bold; width: 100%; transition: all 0.2s; text-align: center; display: block; cursor: pointer; }
        .btn-primary { background-color: #A10F2B; color: white; border: none; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-outline { border: 1.5px solid #A10F2B; color: #A10F2B; background: white; }
        .btn-sub { color: #666; font-size: 0.9rem; text-decoration: underline; background: none; border: none; padding: 8px; margin-top: 5px; }
        .input-field { width: 100%; border: 1px solid #ddd; border-radius: 10px; padding: 12px; background-color: #fafafa; font-size: 16px; }
        
        /* 護照浮水印樣式 */
        .passport-container { position: relative; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; background: #fff; }
        .passport-img { width: 100%; height: auto; display: block; filter: brightness(1.05); }
        .watermark-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transform: rotate(-25deg); font-weight: bold; 
            color: rgba(161, 15, 43, 0.4); text-align: center; pointer-events: none;
            z-index: 20; white-space: nowrap;
        }

        .credit-box { background-color: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 12px; padding: 16px; margin-top: 30px; }
        .countdown-text { font-size: 0.75rem; color: #e53e3e; font-weight: bold; }
    </style>
</head>
<body class="p-4 max-w-md mx-auto min-h-screen flex flex-col">

    <header class="flex flex-col items-center justify-center mb-8 mt-4">
        <div class="pccu-red w-12 h-12 rounded-full flex items-center justify-center text-white font-bold text-xl mb-2 shadow-lg">文</div>
        <h1 class="text-xl font-bold pccu-red-text text-center font-serif">中國文化大學 教務處<br><span class="text-gray-500 text-sm font-normal font-sans">數位化行政服務平台 (POC)</span></h1>
    </header>

    <main class="flex-grow">
        <div id="step-1" class="card">
            <h2 class="text-lg font-bold mb-5 text-gray-700 border-b pb-2 text-center">請選擇服務項目</h2>
            <div class="space-y-4">
                <div onclick="navigateTo('step-transcript')" class="border p-5 rounded-xl flex justify-between items-center hover:bg-gray-50 cursor-pointer border-gray-200">
                    <span class="font-medium text-gray-700">中英文成績單申請</span><span class="text-gray-400">→</span>
                </div>
                <div onclick="navigateTo('step-nationality')" class="border p-5 rounded-xl flex justify-between items-center hover:bg-gray-50 cursor-pointer border-gray-200">
                    <span class="font-medium text-gray-700">畢業證明書補發申請</span><span class="text-gray-400">→</span>
                </div>
                <div onclick="navigateTo('step-eng-intro')" class="border-2 border-blue-100 p-5 rounded-xl flex justify-between items-center bg-blue-50 hover:bg-blue-100 cursor-pointer">
                    <div>
                        <span class="font-bold text-blue-900">英文姓名同步/更新</span>
                        <p class="text-[11px] text-blue-600 mt-1 font-bold">自動辨識護照資訊並同步至學籍</p>
                    </div>
                    <span class="text-blue-400">→</span>
                </div>
            </div>
        </div>

        <div id="step-eng-intro" class="card hidden">
            <h2 class="text-lg font-bold mb-4 text-blue-800">畢業校友英文姓名更新</h2>
            <div class="space-y-4 text-sm text-gray-600 leading-relaxed">
                <p>為提升校友申請國外文件之便利性，本校提供「護照自動同步」服務。影像辨識完畢後即刻銷毀，維護個資安全。</p>
                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <p class="font-bold text-blue-900 mb-1">📢 辦理規則：</p>
                    <ul class="list-disc list-inside space-y-1">
                        <li>僅接受本人有效護照正本拍攝。</li>
                        <li><strong>影像於辨識後立即銷毀，本校不予存檔。</strong></li>
                        <li>更新結果將由您「親自核對」後即時寫入系統。</li>
                    </ul>
                </div>
                <button onclick="navigateTo('step-eng-upload')" class="btn btn-primary mt-4">進入護照掃描</button>
            </div>
        </div>

        <div id="step-eng-upload" class="card hidden">
            <h2 class="text-lg font-bold mb-4 text-gray-700">請拍攝護照資訊頁
